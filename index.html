<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aashi AI 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --rose:#f4a7b9;
  --deep:#c96b8a;
  --text:#3d2030;
  --muted:#9e6b7d;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(135deg,#fff0f6,#ffdce8);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  padding:15px;
}

.float{
  position:fixed;
  font-size:20px;
  opacity:0.15;
  animation:float 10s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh) rotate(0deg);}
  to{transform:translateY(-120vh) rotate(360deg);}
}

.app{
  width:100%;
  max-width:430px;
  background:white;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 20px 70px rgba(0,0,0,0.12);
}

.header{
  background:linear-gradient(135deg,#fff,#ffe5ef);
  padding:22px;
  display:flex;
  align-items:center;
  gap:14px;
  border-bottom:1px solid #f3d7e0;
}

.avatar-wrap{position:relative;}

.avatar{
  width:72px;
  height:72px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #f4a7b9;
}

.online{
  width:14px;
  height:14px;
  background:#4caf50;
  border-radius:50%;
  position:absolute;
  right:3px;
  bottom:4px;
  border:2px solid white;
}

.name{
  font-family:'Cormorant Garamond',serif;
  font-size:30px;
  color:var(--text);
}

.sub{
  color:var(--muted);
  font-size:12px;
  letter-spacing:1px;
}

.tags{
  margin-top:7px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.tag{
  background:#ffe4ec;
  color:var(--deep);
  padding:4px 9px;
  border-radius:20px;
  font-size:11px;
}

.chat{
  height:430px;
  overflow-y:auto;
  padding:16px;
  background:#fff8fb;
}

.message{
  display:flex;
  gap:10px;
  margin-bottom:15px;
  animation:fade 0.25s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.message.user{
  flex-direction:row-reverse;
}

.msg-avatar{
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
}

.user-icon{
  width:34px;
  height:34px;
  border-radius:50%;
  background:linear-gradient(135deg,#f48fb1,#c96b8a);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:13px;
}

.bubble{
  max-width:75%;
  padding:11px 14px;
  border-radius:18px;
  font-size:14px;
  line-height:1.5;
}

.bot .bubble{
  background:white;
  border:1px solid #f2d8e0;
  border-bottom-left-radius:5px;
  color:var(--text);
}

.user .bubble{
  background:linear-gradient(135deg,#f48fb1,#c96b8a);
  color:white;
  border-bottom-right-radius:5px;
}

.time{
  font-size:10px;
  opacity:0.6;
  margin-top:4px;
}

.typing{
  display:flex;
  gap:5px;
  padding:12px 15px;
  background:white;
  border-radius:18px;
  border-bottom-left-radius:5px;
  border:1px solid #f2d8e0;
}

.dot{
  width:6px;
  height:6px;
  background:#f4a7b9;
  border-radius:50%;
  animation:bounce 1s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

.input-area{
  padding:14px;
  background:white;
  border-top:1px solid #f2d8e0;
}

.quick{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:10px;
}

.quick button{
  border:none;
  background:#ffe6ee;
  color:#c96b8a;
  padding:6px 10px;
  border-radius:20px;
  font-size:11px;
  cursor:pointer;
}

.row{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  border:none;
  background:#fff3f7;
  padding:12px 15px;
  border-radius:24px;
  outline:none;
  font-size:14px;
}

.send{
  width:45px;
  height:45px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg,#f48fb1,#c96b8a);
  color:white;
  font-size:18px;
  cursor:pointer;
}

.footer{
  text-align:center;
  margin-top:10px;
  font-size:11px;
  color:var(--muted);
}

.footer span{
  color:#c96b8a;
}
</style>
</head>

<body>

<div class="float" style="left:10%;animation-duration:12s;">💕</div>
<div class="float" style="left:30%;animation-duration:9s;">🌸</div>
<div class="float" style="left:60%;animation-duration:11s;">💖</div>
<div class="float" style="left:85%;animation-duration:14s;">🌹</div>

<div class="app">

<div class="header">

<div class="avatar-wrap">
<img class="avatar" src="aashi.jpg">
<div class="online"></div>
</div>

<div>
<div class="name">Aashi</div>
<div class="sub">Your Personal AI 💕</div>

<div class="tags">
<div class="tag">😊 Caring</div>
<div class="tag">😂 Funny</div>
<div class="tag">🥭 Mango Lover</div>
<div class="tag">💖 Cute</div>
</div>

</div>
</div>

<div class="chat" id="chat">

<div class="message bot">

<img class="msg-avatar" src="aashi.jpg">

<div>
<div class="bubble">
Heyyy 😭💕 I'm Aashi AI. Ask me anything about the prettiest girl alive 🌸
</div>

<div class="time">just now</div>

</div>
</div>
</div>

<div class="input-area">

<div class="quick">
<button onclick="quickMsg('What is her favorite fruit?')">🥭 Favorite fruit</button>
<button onclick="quickMsg('Tell me a fun fact')">😂 Fun fact</button>
<button onclick="quickMsg('Who does she love most?')">💕 Favorite man</button>
<button onclick="quickMsg('Describe her smile')">😭 Her smile</button>
</div>

<div class="row">
<input id="input" type="text" placeholder="Ask anything about Aashi..." onkeydown="if(event.key==='Enter') sendMessage()">
<button class="send" onclick="sendMessage()">➤</button>
</div>

<div class="footer">
Made with <span>💕</span> for Aashi
</div>

</div>
</div>

<script>

const avatar = "aashi.jpg";

const data = {

name:[
"Her name is Aashi 🌸💕",
"Aashiiii 😭❤️",
"Princess Aashi hehe 💖"
],

age:[
"She's 22 and still acts like a cute baby sometimes 😭💕",
"Aashi is 22 🌸",
"22 years of pure cuteness ❤️"
],

work:[
"She works at VLCC 💼💕",
"VLCC got the prettiest employee hehe 🌸",
"Imagine going to VLCC and meeting HER 😭❤️"
],

smile:[
"Her smile is literally dangerous 😭❤️",
"That smile can fix anyone's worst day 💕",
"Ashutosh probably fell for her smile first 😂💖"
],

nature:[
"She's empathetic, caring and funny 🌸💕",
"Aashi has the softest heart ever 😭",
"Cute outside, emotional teddy bear inside 💖"
],

fruit:[
"She LOVES mangoes 🥭😭",
"Favorite fruit = mango 💕",
"Girl would sell Ashutosh for mangoes 😂🥭"
],

snack:[
"She loves sandwiches 🥪💕",
"Sandwiches are her comfort snack 😭",
"Feed her sandwiches and she'll instantly become happier 😂❤️"
],

school:[
"She studied at Modern Convent 🏫💕",
"Modern Convent's cutest student hehe 🌸"
],

love:[
"Her favorite man is ASHUTOSH 😭❤️",
"She finds Ashutosh super hot 😂💕",
"Lowkey obsessed with Ashutosh honestly 😭💖"
],

smoke:[
"She smokes Choti Advance 🚬😭",
"Tiny cigarette but full attitude 😂",
"While smoking she looks extra dramatic 😭🚬"
],

personality:[
"She's empathetic, funny and caring 💕",
"Cute + funny + emotional = Aashi 🌸",
"Golden retriever energy honestly 😂❤️"
],

funfact:[
"While smoking she closes one eye 😂🚬",
"She only cleans the house when her mother is about to come 😭💕",
"Acts innocent but is secretly chaotic 😂"
],

default:[
"Aashi is chaos + sweetness combined 😂💕",
"She's literally adorable 🌸",
"Ask me more about Aashi 😭❤️"
]

};

function pick(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function getReply(text){

text = text.toLowerCase();

if(text.includes('name')) return pick(data.name);

if(text.includes('age') || text.includes('old')) return pick(data.age);

if(text.includes('work') || text.includes('vlcc')) return pick(data.work);

if(text.includes('smile')) return pick(data.smile);

if(text.includes('nature') || text.includes('personality')) return pick(data.personality);

if(text.includes('fruit') || text.includes('mango')) return pick(data.fruit);

if(text.includes('snack') || text.includes('sandwich')) return pick(data.snack);

if(text.includes('school') || text.includes('modern convent')) return pick(data.school);

if(text.includes('love') || text.includes('ashutosh') || text.includes('favorite man') || text.includes('hot')) return pick(data.love);

if(text.includes('smoke') || text.includes('cigarette') || text.includes('choti advance')) return pick(data.smoke);

if(text.includes('fun fact') || text.includes('funny') || text.includes('eye') || text.includes('clean')) return pick(data.funfact);

return pick(data.default);

}

function time(){
return new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
});
}

function addMessage(type,text){

const chat = document.getElementById('chat');

const div = document.createElement('div');

div.className = 'message ' + type;

if(type === 'bot'){

div.innerHTML = `
<img class="msg-avatar" src="${avatar}">
<div>
<div class="bubble">${text}</div>
<div class="time">${time()}</div>
</div>
`;

}else{

div.innerHTML = `
<div class="user-icon">💬</div>
<div>
<div class="bubble">${text}</div>
<div class="time">${time()}</div>
</div>
`;

}

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;

}

function typing(){

const chat = document.getElementById('chat');

const div = document.createElement('div');

div.className = 'message bot';

div.id = 'typing';

div.innerHTML = `
<img class="msg-avatar" src="${avatar}">
<div class="typing">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
`;

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;

}

function removeTyping(){

const t = document.getElementById('typing');

if(t){
t.remove();
}

}

function sendMessage(){

const input = document.getElementById('input');

const text = input.value.trim();

if(!text) return;

addMessage('user',text);

input.value = '';

typing();

setTimeout(()=>{

removeTyping();

const reply = getReply(text);

addMessage('bot',reply);

},1000);

}

function quickMsg(text){

document.getElementById('input').value = text;

sendMessage();

}

</script>

</body>
</html>
